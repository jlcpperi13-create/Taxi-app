<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFB020">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Taxímetro · Cierre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg: #15181A;
  --surface: #1F2427;
  --surface-2: #262B2E;
  --surface-3: #2E3437;
  --amber: #FFB020;
  --amber-dim: #7A5410;
  --amber-glow: rgba(255,176,32,0.25);
  --teal: #3FA796;
  --coral: #E4574C;
  --paper: #ECE7DA;
  --ink: #EDEDE7;
  --muted: #9AA0A0;
  --hair: #33393C;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
body{margin:0; background:var(--bg); color:var(--ink); font-family:'Work Sans',sans-serif; min-height:100vh;}
h1,h2,h3,.display{font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:0.02em; text-transform:uppercase;}
.mono{font-family:'JetBrains Mono',monospace; font-variant-numeric: tabular-nums;}
button{font-family:inherit; cursor:pointer;}
input,select{font-family:inherit;}

/* ---------- app shell ---------- */
.app{max-width:520px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; background:var(--bg); position:relative;}

/* ---------- lock screen ---------- */
.lock-screen{
  position:fixed; inset:0; z-index:100; background:var(--bg);
  display:flex; align-items:center; justify-content:center; flex-direction:column; padding:24px;
}
.lock-box{max-width:340px; width:100%; text-align:center;}
.lock-icon{font-size:38px; margin-bottom:10px;}
.lock-title{font-size:22px; color:var(--ink); margin-bottom:6px;}
.lock-sub{font-size:13px; color:var(--muted); margin-bottom:22px;}
.lock-box input{
  width:100%; background:var(--surface-2); border:1px solid var(--hair); color:var(--ink);
  padding:14px; border-radius:9px; font-size:20px; text-align:center; letter-spacing:0.3em;
  outline:none; margin-bottom:14px;
}
.lock-box input:focus{border-color:var(--amber); box-shadow:0 0 0 3px var(--amber-glow);}
.lock-error{color:var(--coral); font-size:13px; min-height:18px; margin-bottom:10px;}

/* ---------- meter panel (signature element) ---------- */
.meter{
  background: linear-gradient(180deg, #191D1F, #121516);
  border-bottom: 1px solid var(--hair);
  padding: 18px 18px 16px;
  position: sticky; top:0; z-index: 20;
}
.meter-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
.meter-brand{font-size:13px; letter-spacing:0.18em; color:var(--amber); display:flex; align-items:center; gap:8px;}
.meter-brand .dot{width:7px; height:7px; border-radius:50%; background:var(--amber); box-shadow:0 0 8px 2px var(--amber-glow); animation: pulse 2.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}
.meter-date{font-size:12px; color:var(--muted);}
.meter-readout{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
.meter-cell{background:#0F1213; border:1px solid var(--hair); border-radius:6px; padding:8px 6px; text-align:center;}
.meter-cell .label{font-size:9.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:3px;}
.meter-cell .value{font-size:19px; color:var(--amber); text-shadow:0 0 10px var(--amber-glow); line-height:1.1;}
.meter-cell.teal .value{color:var(--teal); text-shadow:0 0 10px rgba(63,167,150,0.25);}
@media (prefers-reduced-motion: reduce){ .dot{animation:none;} }

/* ---------- content ---------- */
.content{flex:1; padding: 16px 16px 90px; overflow-y:auto;}
.section-title{font-size:22px; color:var(--ink); margin: 4px 0 14px; display:flex; align-items:center; justify-content:space-between;}
.section-title .sub{font-size:12px; color:var(--muted); text-transform:none; font-family:'Work Sans'; letter-spacing:0; font-weight:400;}

.card{background:var(--surface); border:1px solid var(--hair); border-radius:12px; padding:16px; margin-bottom:12px;}
.card + .card{margin-top:12px;}

.field{margin-bottom:12px;}
.field label{display:block; font-size:11.5px; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.05em;}
.field input, .field select{
  width:100%; background:var(--surface-2); border:1px solid var(--hair); color:var(--ink);
  padding:10px 11px; border-radius:8px; font-size:15px; outline:none;
}
.field input:focus, .field select:focus{border-color:var(--amber); box-shadow:0 0 0 3px var(--amber-glow);}
.row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.row3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;}

.btn{border:none; border-radius:9px; padding:12px 16px; font-size:14px; font-weight:600; width:100%;}
.btn-primary{background:var(--amber); color:#1A1300;}
.btn-primary:active{background:#e6a01c;}
.btn-ghost{background:transparent; border:1px solid var(--hair); color:var(--ink);}
.btn-danger{background:transparent; border:1px solid var(--coral); color:var(--coral);}
.btn-row{display:flex; gap:8px;}
.btn-row .btn{width:auto; flex:1;}

.pct-toggle{display:flex; background:var(--surface-2); border-radius:8px; padding:3px; gap:3px;}
.pct-toggle button{flex:1; background:transparent; border:none; color:var(--muted); padding:8px; border-radius:6px; font-size:13px;}
.pct-toggle button.active{background:var(--amber); color:#1A1300; font-weight:600;}

.entry{border-bottom:1px solid var(--hair); padding:12px 0;}
.entry:last-child{border-bottom:none;}
.entry-top{display:flex; justify-content:space-between; align-items:baseline;}
.entry-date{font-size:15px; font-weight:600;}
.entry-amount{font-family:'JetBrains Mono',monospace; color:var(--amber); font-size:15px;}
.entry-meta{font-size:12px; color:var(--muted); margin-top:3px;}
.entry-tags{display:flex; gap:6px; margin-top:6px; flex-wrap:wrap;}
.tag{font-size:10.5px; padding:2px 8px; border-radius:20px; border:1px solid var(--hair); color:var(--muted); text-transform:uppercase; letter-spacing:0.04em;}
.tag.pag{color:var(--teal); border-color:rgba(63,167,150,0.4);}
.tag.pend{color:var(--amber); border-color:rgba(255,176,32,0.4);}
.tag.anulado{color:var(--coral); border-color:rgba(228,87,76,0.4);}

.empty{text-align:center; padding:40px 20px; color:var(--muted);}
.empty .display{font-size:20px; color:var(--ink); margin-bottom:6px;}

.month-header{display:flex; justify-content:space-between; align-items:center; margin:22px 0 10px;}
.month-header:first-child{margin-top:0;}
.month-name{font-size:17px;}
.month-total{font-family:'JetBrains Mono',monospace; color:var(--amber); font-size:14px;}

.bar-row{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
.bar-label{width:64px; font-size:11px; color:var(--muted); flex-shrink:0;}
.bar-track{flex:1; background:var(--surface-2); border-radius:5px; height:16px; overflow:hidden;}
.bar-fill{height:100%; background:linear-gradient(90deg, var(--amber-dim), var(--amber)); border-radius:5px;}
.bar-value{width:66px; text-align:right; font-family:'JetBrains Mono',monospace; font-size:12px; flex-shrink:0;}

/* ---------- bottom nav ---------- */
.nav{position:fixed; bottom:0; left:0; right:0; z-index:30; display:flex; justify-content:center;}
.nav-inner{max-width:520px; width:100%; background:#0F1213; border-top:1px solid var(--hair); display:flex; padding: 6px 10px calc(6px + env(safe-area-inset-bottom));}
.nav-btn{flex:1; background:transparent; border:none; color:var(--muted); display:flex; flex-direction:column; align-items:center; gap:3px; padding:8px 4px; border-radius:10px;}
.nav-btn.active{color:var(--amber);}
.nav-btn .icon{width:20px; height:20px;}
.nav-btn .lbl{font-size:10px; text-transform:uppercase; letter-spacing:0.06em; font-family:'Barlow Condensed'; font-weight:600;}

.toast{position:fixed; bottom:78px; left:50%; transform:translateX(-50%); background:var(--surface-3); border:1px solid var(--hair); color:var(--ink); padding:9px 16px; border-radius:20px; font-size:13px; z-index:50; opacity:0; transition:opacity 0.25s;}
.toast.show{opacity:1;}

.fab-add{position:sticky; bottom:0;}
.driver-pill{display:flex; gap:6px; margin-bottom:14px;}
.driver-pill button{flex:1; background:var(--surface-2); border:1px solid var(--hair); color:var(--muted); padding:7px; border-radius:8px; font-size:12.5px;}
.driver-pill button.active{border-color:var(--amber); color:var(--amber);}

.notice{background:rgba(255,176,32,0.08); border:1px solid var(--amber-dim); border-radius:10px; padding:10px 12px; font-size:12px; color:var(--muted); margin-bottom:14px; line-height:1.4;}
.subhead{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:10px; font-weight:600;}
.loading{text-align:center; padding:30px; color:var(--muted); font-size:13px;}
</style>
</head>
<body>

<div class="lock-screen" id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">🔒</div>
    <div class="lock-title display">Acceso privado</div>
    <div class="lock-sub">Inicia sesión con tu cuenta autorizada</div>
    <input type="email" id="loginEmail" placeholder="Correo electrónico" autocomplete="email" style="margin-bottom:10px;">
    <input type="password" id="loginPassword" placeholder="Contraseña" autocomplete="current-password" onkeydown="if(event.key==='Enter'){firebaseLogin();}">
    <div class="lock-error" id="lockError"></div>
    <button class="btn btn-primary" id="loginBtn" onclick="firebaseLogin()">Entrar</button>
  </div>
</div>

<div class="app" id="app" style="display:none;"></div>

<script>
/* ---------- pantalla de acceso (mostrar/ocultar) ---------- */
function showApp(){
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('app').style.display = '';
}
function hideApp(){
  document.getElementById('lockScreen').style.display = '';
  document.getElementById('app').style.display = 'none';
  const emailEl = document.getElementById('loginEmail');
  const passEl = document.getElementById('loginPassword');
  if(emailEl) emailEl.value = '';
  if(passEl) passEl.value = '';
}

const LS_PREFIX = 'taxi-cierre-app:';
function lsGet(key){
  const raw = localStorage.getItem(LS_PREFIX + key);
  return raw === null ? null : { value: raw };
}
function lsSet(key, value){
  localStorage.setItem(LS_PREFIX + key, value);
  return { value };
}

const CAT_DIARIO = [
  {id:'gasolina', label:'Gasolina'},
  {id:'autopista', label:'Autopista'},
  {id:'autopista_tarjeta', label:'Autopista (tarjeta)'},
  {id:'tarjeta', label:'Tarjeta / TPV'},
  {id:'otros', label:'Otros'},
];
const CAT_PERIODICO = [
  {id:'seguro', label:'Seguro'},
  {id:'itv', label:'ITV'},
  {id:'mantenimiento', label:'Mantenimiento'},
  {id:'seguridad_social', label:'Seguridad Social'},
  {id:'cuota_reta', label:'Cuota RETA'},
  {id:'cuota_gremial', label:'Cuota gremial'},
  {id:'amortizacion', label:'Amortización'},
  {id:'salario', label:'Salario'},
  {id:'otros_fijos', label:'Otros fijos'},
];
const catLabel = (list, id) => (list.find(c=>c.id===id) || {}).label || id;

let state = {
  tab: 'cierre',
  cierres: [],
  servicios: [],
  gastos: [],
  mantenimientos: [],
  tiposMantenimiento: ['Cambio de aceite','Neumáticos','ITV','Frenos','Filtros','Batería','Revisión general','Otros'],
  driver: 'Chofer 1',
  drivers: ['Chofer 1','Chofer 2'],
  pctEmpresa: 65,
  loaded: false,
  editingCierreId: null,
  editingServicioId: null,
  editingGastoId: null,
  editingMantenimientoId: null,
  gastoTipo: 'diario',
  gastoPrefillFecha: null,
  skipPrefill: false,
  mesActual: null,
  workDate: null,
};

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const fmt = (n) => (isFinite(n) ? n : 0).toLocaleString('es-ES', {minimumFractionDigits:2, maximumFractionDigits:2});
const round2 = (n) => Math.round(((+n || 0) + Number.EPSILON) * 100) / 100;
const todayISO = () => new Date().toISOString().slice(0,10);
const monthKey = (iso) => iso.slice(0,7);
const monthLabel = (key) => {
  const [y,m] = key.split('-');
  const names = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${names[parseInt(m,10)-1]} ${y}`;
};

async function loadData(){
  try{
    const c = lsGet('cierres-data');
    state.cierres = c ? JSON.parse(c.value) : [];
  }catch(e){ state.cierres = []; }
  try{
    const s = lsGet('servicios-data');
    state.servicios = s ? JSON.parse(s.value) : [];
  }catch(e){ state.servicios = []; }
  try{
    const g = lsGet('gastos-data');
    state.gastos = g ? JSON.parse(g.value) : [];
  }catch(e){ state.gastos = []; }
  try{
    const mant = lsGet('mantenimiento-data');
    state.mantenimientos = mant ? JSON.parse(mant.value) : [];
  }catch(e){ state.mantenimientos = []; }
  try{
    const cfg = lsGet('config-data');
    if(cfg){
      const parsed = JSON.parse(cfg.value);
      if(Array.isArray(parsed.drivers) && parsed.drivers.length === 2) state.drivers = parsed.drivers;
      if(parsed.driver) state.driver = parsed.driver;
      if(parsed.pctEmpresa) state.pctEmpresa = parsed.pctEmpresa;
      if(Array.isArray(parsed.tiposMantenimiento) && parsed.tiposMantenimiento.length) state.tiposMantenimiento = parsed.tiposMantenimiento;
    }
  }catch(e){ /* keep defaults */ }
  if(!state.drivers.includes(state.driver)) state.driver = state.drivers[0];

  const migration = migrateLegacyExpenses();
  state.loaded = true;
  render();
  if(migration.changed) await saveCierres();
  if(migration.gastosChanged) await saveGastos();
}

async function saveCierres(){
  try{ lsSet('cierres-data', JSON.stringify(state.cierres)); }
  catch(e){ showToast('No se pudo guardar (memoria del navegador llena o bloqueada).'); }
}
async function saveServicios(){
  try{ lsSet('servicios-data', JSON.stringify(state.servicios)); }
  catch(e){ showToast('No se pudo guardar (memoria del navegador llena o bloqueada).'); }
}
async function saveGastos(){
  try{ lsSet('gastos-data', JSON.stringify(state.gastos)); }
  catch(e){ showToast('No se pudo guardar (memoria del navegador llena o bloqueada).'); }
}
async function saveMantenimientos(){
  try{ lsSet('mantenimiento-data', JSON.stringify(state.mantenimientos)); }
  catch(e){ showToast('No se pudo guardar (memoria del navegador llena o bloqueada).'); }
}
async function saveConfig(){
  try{ lsSet('config-data', JSON.stringify({ drivers: state.drivers, driver: state.driver, pctEmpresa: state.pctEmpresa, tiposMantenimiento: state.tiposMantenimiento })); }
  catch(e){ showToast('No se pudo guardar (memoria del navegador llena o bloqueada).'); }
}

/* migrate old lump-sum expense fields (from before the Gastos tab existed) into individual entries */
function migrateLegacyExpenses(){
  const map = {gasolina:'gasolina', autopista:'autopista', gastTarj:'tarjeta', otrosGast:'otros'};
  let changed = false, gastosChanged = false;
  state.cierres.forEach(c => {
    const legacyFields = Object.keys(map);
    const hasLegacy = legacyFields.some(f => c[f] !== undefined && c[f] !== '' && c[f] !== null && +c[f] !== 0);
    if(hasLegacy){
      legacyFields.forEach(f => {
        const val = +c[f];
        if(val){
          state.gastos.push({ id: uid(), tipo:'diario', fecha: c.fecha, categoria: map[f], importe: val, nota: 'Migrado del cierre diario', chofer: c.chofer });
          gastosChanged = true;
        }
      });
      legacyFields.forEach(f => delete c[f]);
      changed = true;
    }
  });
  return { changed, gastosChanged };
}

let toastTimer;
function showToast(msg){
  let t = document.getElementById('toast');
  if(!t){
    t = document.createElement('div');
    t.id = 'toast'; t.className = 'toast';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove('show'), 1800);
}

/* ---------- derived ---------- */
function summarizeGastos(items){
  const sum = cat => items.filter(g => g.categoria === cat).reduce((s,g)=> s + (+g.importe||0), 0);
  const gasolina = sum('gasolina');
  const autopistaEfectivo = sum('autopista');
  const autopistaTarjeta = sum('autopista_tarjeta');
  const autopista = autopistaEfectivo + autopistaTarjeta;
  const tarjeta = sum('tarjeta');
  const otros = sum('otros');
  return { gasolina, autopista, autopistaEfectivo, autopistaTarjeta, tarjeta, otros, total: gasolina + tarjeta + otros, items };
}

/* Servicios/gastos "del turno abierto" de un chofer: solo lo que aún está vivo (sin archivar en ningún
   cierre) para esa fecha+chofer. Al cerrar el turno esto vuelve a quedar a cero automáticamente. */
function serviciosAbiertos(fecha, chofer){
  return state.servicios.filter(s => s.fecha === fecha && s.chofer === chofer);
}
function gastosAbiertos(fecha, chofer){
  return state.gastos.filter(g => g.tipo === 'diario' && g.fecha === fecha && g.chofer === chofer);
}

/* Servicios/gastos que corresponden a UN cierre concreto: sus propios archivados + lo que siga
   vivo (sin archivar) de esa fecha+chofer, por si se añadió algo nuevo antes de volver a guardar. */
function serviciosDeCierre(d){
  const propios = Array.isArray(d.serviciosArchivados) ? d.serviciosArchivados : [];
  return [...propios, ...serviciosAbiertos(d.fecha, d.chofer)];
}
function gastosDeCierre(d){
  const propios = Array.isArray(d.gastosArchivados) ? d.gastosArchivados : [];
  return [...propios, ...gastosAbiertos(d.fecha, d.chofer)];
}

/* servicios "vivos" (aún en la lista general) + servicios ya archivados dentro de un cierre de esa fecha/mes
   — usado para informes globales (mensual/anual), sin distinguir por chofer */
function serviciosDeFecha(fecha){
  const archivados = state.cierres
    .filter(c => c.fecha === fecha && Array.isArray(c.serviciosArchivados))
    .flatMap(c => c.serviciosArchivados);
  const vivos = state.servicios.filter(s => s.fecha === fecha);
  return [...archivados, ...vivos];
}
function serviciosDeMes(mes){
  const archivados = state.cierres
    .filter(c => monthKey(c.fecha) === mes && Array.isArray(c.serviciosArchivados))
    .flatMap(c => c.serviciosArchivados);
  const vivos = state.servicios.filter(s => monthKey(s.fecha) === mes);
  return [...archivados, ...vivos];
}
function todosLosServicios(){
  const archivados = state.cierres.flatMap(c => Array.isArray(c.serviciosArchivados) ? c.serviciosArchivados : []);
  return [...archivados, ...state.servicios];
}

function cierreCalc(d){
  const facturado = round2(+d.facturado || 0);
  const kmInicio = +d.kmInicio || 0;
  const kmFin = +d.kmFin || 0;
  const serviciosDia = serviciosDeCierre(d).filter(s => s.estado !== 'anulado');
  const conTarjeta = s => s.pago === 'tarjeta' || s.pago === 'tpv' || s.pago === 'transf';
  const cardServicios = round2(serviciosDia.filter(conTarjeta).reduce((s,x)=> s + (+x.importe||0), 0));
  const propinas = round2(serviciosDia.filter(conTarjeta).reduce((s,x)=> s + (+x.propina||0), 0));
  const gastos = summarizeGastos(gastosDeCierre(d));
  const gastosEfectivo = round2(gastos.gasolina + gastos.otros + gastos.autopistaTarjeta);
  const efectivo = round2(facturado - cardServicios - gastosEfectivo);
  const kmJornada = Math.max(0, kmFin - kmInicio);
  const eurosPorKm = kmJornada > 0 ? round2(facturado / kmJornada) : 0;
  const pct = (+d.pctEmpresa || state.pctEmpresa) / 100;
  const importeEmpresa = round2(facturado * pct);
  const choferBase = round2(facturado * (1 - pct));
  const importeChofer = round2(choferBase + propinas);
  const efectivoEmpresa = round2(efectivo - importeChofer + gastos.autopista);
  const tarjetaBoxTotal = round2(cardServicios + gastos.autopistaTarjeta);
  return { facturado, cardServicios, tarjetaBoxTotal, propinas, efectivo, gastosEfectivo, efectivoEmpresa, kmJornada, eurosPorKm, importeEmpresa, choferBase, importeChofer, totalGastos: round2(gastos.total), autopista: round2(gastos.autopista), gastosDetalle: gastos };
}

/* Contador del turno EN CURSO (aún no cerrado) del chofer activo. Al pulsar "Cerrar turno" todo lo
   que suma aquí queda archivado dentro del cierre y este contador vuelve a cero automáticamente,
   tanto si sigue el mismo chofer como si entra el otro. */
function todayMeter(chofer, fecha){
  chofer = chofer || state.driver;
  const dateStr = fecha || state.workDate || todayISO();
  const draft = { fecha: dateStr, chofer };
  const facturado = round2(serviciosDeCierre(draft).filter(s => s.estado !== 'anulado').reduce((s,x)=> s + (+x.importe||0), 0));
  const calc = cierreCalc({ ...draft, facturado });
  return { ...calc, gastos: calc.totalGastos };
}
function fechaCorta(iso){
  const dt = new Date((iso || todayISO()) + 'T00:00:00');
  return dt.toLocaleDateString('es-ES',{weekday:'short', day:'numeric', month:'short'});
}
function onMeterFechaChange(v){
  state.workDate = v || todayISO();
  render();
}
function updateMeterPanel(){

  const map = {'meter-facturado': m.facturado, 'meter-efectivo': m.efectivo, 'meter-gastos': m.gastos, 'meter-efectivo-empresa': m.efectivoEmpresa};

  document.getElementById('calc-tarjeta').textContent = `−€${fmt(calc.tarjetaBoxTotal)}`;

  if(tarjetaServEl) tarjetaServEl.textContent = `€${fmt(calc.cardServicios)}`;
  document.getElementById('calc-efectivo-empresa').textContent = `€${fmt(calc.efectivoEmpresa)}`;
  document.getElementById('calc-km').textContent = `${fmt(calc.kmJornada)}`;
  document.getElementById('calc-euros-km').textContent = `€${fmt(calc.eurosPorKm)}`;
  document.getElementById('calc-gastos').textContent = `€${fmt(calc.totalGastos)}`;

  document.getElementById('calc-gastos-otros').textContent = `€${fmt(calc.gastosDetalle.otros)}`;

async function closeShiftNow(){
  document.getElementById('f-fecha').value = todayISO();
  await saveCierre(null, true);
}

async function saveCierre(id, stampNow){
  const d = {
    id: id || uid(),
    fecha: document.getElementById('f-fecha').value || todayISO(),
    chofer: document.getElementById('f-chofer').value || state.driver,
    clientes: document.getElementById('f-clientes').value,
    facturado: round2(document.getElementById('f-facturado').value),
    kmInicio: document.getElementById('f-kmInicio').value,
    kmFin: document.getElementById('f-kmFin').value,
    pctEmpresa: state.pctEmpresa,
  };
  if(stampNow || !id){
    d.horaCierre = new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
  } else {
    const prev = state.cierres.find(x=>x.id===id);
    if(prev && prev.horaCierre) d.horaCierre = prev.horaCierre;
  }

  /* Archivar dentro del cierre los servicios y gastos de ESE turno (fecha + chofer) y quitarlos
     de las listas generales, para que el contador del turno en curso vuelva a cero */
  const prevCierre = id ? state.cierres.find(x=>x.id===id) : null;
  const prevServiciosArchivados = (prevCierre && prevCierre.serviciosArchivados) || [];
  const prevGastosArchivados = (prevCierre && prevCierre.gastosArchivados) || [];
  const nuevosServicios = state.servicios.filter(s => s.fecha === d.fecha && s.chofer === d.chofer);
  const nuevosGastos = state.gastos.filter(g => g.tipo === 'diario' && g.fecha === d.fecha && g.chofer === d.chofer);
  d.serviciosArchivados = [...prevServiciosArchivados, ...nuevosServicios];
  d.gastosArchivados = [...prevGastosArchivados, ...nuevosGastos];
  state.servicios = state.servicios.filter(s => !(s.fecha === d.fecha && s.chofer === d.chofer));
  state.gastos = state.gastos.filter(g => !(g.tipo === 'diario' && g.fecha === d.fecha && g.chofer === d.chofer));

  const wasNew = !id;
  if(id){
    const idx = state.cierres.findIndex(x=>x.id===id);
    state.cierres[idx] = d;
  } else {
    state.cierres.push(d);
  }
  state.editingCierreId = null;
  if(wasNew){ state.skipPrefill = true; state.workDate = null; }
  await saveCierres();
  await saveServicios();
  await saveGastos();
  const partes = [];
  if(nuevosServicios.length) partes.push(`${nuevosServicios.length} servicio(s)`);
  if(nuevosGastos.length) partes.push(`${nuevosGastos.length} gasto(s)`);
  showToast(partes.length ? `Cierre guardado · ${partes.join(' y ')} archivado(s)` : 'Cierre guardado');
  render();
}

async function deleteCierre(id){
  const cierre = state.cierres.find(x=>x.id===id);
  const serviciosRestaurados = (cierre && Array.isArray(cierre.serviciosArchivados)) ? cierre.serviciosArchivados : [];
  const gastosRestaurados = (cierre && Array.isArray(cierre.gastosArchivados)) ? cierre.gastosArchivados : [];
  if(serviciosRestaurados.length){
    state.servicios = [...state.servicios, ...serviciosRestaurados];
    await saveServicios();
  }
  if(gastosRestaurados.length){
    state.gastos = [...state.gastos, ...gastosRestaurados];
    await saveGastos();
  }
  state.cierres = state.cierres.filter(x=>x.id!==id);
  state.editingCierreId = null;
  await saveCierres();
  const partes = [];
  if(serviciosRestaurados.length) partes.push(`${serviciosRestaurados.length} servicio(s)`);
  if(gastosRestaurados.length) partes.push(`${gastosRestaurados.length} gasto(s)`);
  showToast(partes.length ? `Cierre eliminado · ${partes.join(' y ')} restaurado(s)` : 'Cierre eliminado');
  render();
}

function ultimoKmFinCierre(){
  const conKm = state.cierres.filter(c => c.kmFin);
  if(!conKm.length) return '';
  const ordenados = [...conKm].sort((a,b)=> a.fecha.localeCompare(b.fecha) || (a.horaCierre||'').localeCompare(b.horaCierre||''));
  return ordenados[ordenados.length-1].kmFin;
}

function kmActualEstimado(){
  const ultimo = ultimoKmFinCierre();
  if(ultimo) return +ultimo;
  const kms = [];
  state.cierres.forEach(c => { if(c.kmInicio) kms.push(+c.kmInicio); });
  state.mantenimientos.forEach(m => { if(m.km) kms.push(+m.km); });
  return kms.length ? Math.max(...kms) : 0;
}

/* Avisa 30 días antes (fecha) o 1000 km antes (kilometraje) de que toque el próximo mantenimiento */
function mantenimientoAvisos(m, kmActual, hoy){
  const avisos = [];
  if(m.proximoFecha){
    const dias = Math.round((new Date(m.proximoFecha+'T00:00:00') - new Date(hoy+'T00:00:00')) / 86400000);
    const fechaTxt = new Date(m.proximoFecha+'T00:00:00').toLocaleDateString('es-ES',{day:'2-digit',month:'short'});
    let cls = '', txt;
    if(dias < 0){ cls = 'anulado'; txt = `⚠ vencido hace ${Math.abs(dias)} día${Math.abs(dias)===1?'':'s'}`; }
    else if(dias <= 30){ cls = 'pend'; txt = `⚠ en ${dias} día${dias===1?'':'s'} (${fechaTxt})`; }
    else { txt = `aviso ${fechaTxt}`; }
    avisos.push({cls, txt});
  }
  if(m.proximoKm){
    const restante = Math.round((+m.proximoKm) - kmActual);
    let cls = '', txt;
    if(restante <= 0){ cls = 'anulado'; txt = `⚠ superado por ${Math.abs(restante).toLocaleString('es-ES')} km`; }
    else if(restante <= 1000){ cls = 'pend'; txt = `⚠ en ${restante.toLocaleString('es-ES')} km`; }
    else { txt = `aviso a los ${(+m.proximoKm).toLocaleString('es-ES')} km`; }
    avisos.push({cls, txt});
  }
  return avisos;
}

function mantenimientoUltimoDeTipo(tipo, fecha, excludeId){
  if(!tipo) return null;
  const previos = state.mantenimientos
    .filter(x => x.id !== excludeId && x.tipo && x.tipo.toLowerCase() === tipo.toLowerCase() && x.fecha <= fecha)
    .sort((a,b)=> b.fecha.localeCompare(a.fecha));
  return previos[0] || null;
}

function mantenimientoReferenciaHTML(tipo, fecha, km, excludeId){
  tipo = (tipo || '').trim();
  fecha = fecha || todayISO();
  const prev = mantenimientoUltimoDeTipo(tipo, fecha, excludeId);
  if(!prev) return `<div class="notice">Sin registros anteriores de "${tipo || 'este tipo'}" para comparar.</div>`;
  const dias = Math.round((new Date(fecha+'T00:00:00') - new Date(prev.fecha+'T00:00:00')) / 86400000);
  const prevFechaTxt = new Date(prev.fecha+'T00:00:00').toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'});
  let kmTxt = 'sin datos de km para comparar';
  if(km && prev.km){
    const kmDiff = (+km) - (+prev.km);
    kmTxt = kmDiff >= 0 ? `${kmDiff.toLocaleString('es-ES')} km recorridos` : 'km introducidos menores que el registro anterior';
  }
  return `<div class="notice">Último "${prev.tipo}": ${prevFechaTxt} · hace ${dias} día${dias===1?'':'s'} · ${kmTxt}</div>`;
}

function updateMantenimientoReferencia(){
  const tipoEl = document.getElementById('mt-tipo');
  const fechaEl = document.getElementById('mt-fecha');
  const kmEl = document.getElementById('mt-km');
  const el = document.getElementById('mt-referencia');
  if(!tipoEl || !fechaEl || !kmEl || !el) return;
  const excludeId = state.editingMantenimientoId || null;
  el.innerHTML = mantenimientoReferenciaHTML(tipoEl.value, fechaEl.value, kmEl.value, excludeId);
}

function mantenimientoRowHTML(m, kmActual, hoy){
  const dt = new Date(m.fecha + 'T00:00:00');

async function saveMantenimiento(id){
  const fecha = document.getElementById('mt-fecha').value || todayISO();
  const tipo = document.getElementById('mt-tipo').value.trim();
  if(!tipo){ showToast('Indica el tipo de mantenimiento'); return; }
  const m = {
    id: id || uid(),
    fecha,
    km: document.getElementById('mt-km').value,
    tipo,
    coste: round2(document.getElementById('mt-coste').value),
    taller: document.getElementById('mt-taller').value.trim(),
    proximoFecha: document.getElementById('mt-proximaFecha').value,
    proximoKm: document.getElementById('mt-proximoKm').value,
    nota: document.getElementById('mt-nota').value.trim(),
  };
  if(id){
    const idx = state.mantenimientos.findIndex(x=>x.id===id);
    state.mantenimientos[idx] = m;
  } else {
    state.mantenimientos.push(m);
  }
  if(!state.tiposMantenimiento.some(t => t.toLowerCase() === tipo.toLowerCase())){
    state.tiposMantenimiento.push(tipo);
    await saveConfig();
  }
  state.editingMantenimientoId = null;
  await saveMantenimientos();
  showToast(id ? 'Mantenimiento actualizado' : 'Mantenimiento añadido');
  render();
}

function editMantenimiento(id){ state.editingMantenimientoId = id; render(); window.scrollTo(0,0); }

async function deleteMantenimientoConfirm(id){
  if(!confirm('¿Eliminar este mantenimiento?')) return;
  state.mantenimientos = state.mantenimientos.filter(x=>x.id!==id);
  state.editingMantenimientoId = null;
  await saveMantenimientos();
  showToast('Mantenimiento eliminado');
  render();
}

/* ---------- PDF EXPORT ---------- */
function buildClosingPDF(title, subtitle, sections){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'pt', format:'a4' });
  const marginX = 40;
  let y = 50;
  doc.setFont('helvetica','bold');
  doc.setFontSize(18);
  doc.text(title, marginX, y);
  y += 22;
  doc.setFont('helvetica','normal');
  doc.setFontSize(11);
  doc.setTextColor(120);
  doc.text(String(subtitle), marginX, y);
  doc.setTextColor(0);
  y += 30;

  sections.forEach(section => {
    if(y > 760){ doc.addPage(); y = 50; }
    doc.setFont('helvetica','bold');
    doc.setFontSize(13);
    doc.text(section.heading, marginX, y);
    y += 18;
    doc.setFont('helvetica','normal');
    doc.setFontSize(11);
    section.rows.forEach(([label, value]) => {
      if(y > 780){ doc.addPage(); y = 50; }
      doc.text(String(label), marginX, y);
      doc.text(String(value), 400, y, { align:'right' });
      y += 16;
    });
    y += 14;
  });

  doc.setFontSize(9);
  doc.setTextColor(150);
  doc.text(`Generado el ${new Date().toLocaleString('es-ES')}`, marginX, 810);
  return doc;
}

function totalesMes(mes){
  const cierresMes = state.cierres.filter(d => monthKey(d.fecha) === mes).sort((a,b)=> a.fecha.localeCompare(b.fecha));
  const serviciosMes = serviciosDeMes(mes).filter(s => s.estado !== 'anulado');
  const gastosFijosMes = state.gastos.filter(g => g.tipo === 'periodico' && monthKey(g.fecha) === mes);
  const totals = cierresMes.reduce((acc, d) => {
    const calc = cierreCalc(d);
    acc.facturado += calc.facturado;
    acc.efectivo += calc.efectivo;
    acc.efectivoEmpresa += calc.efectivoEmpresa;
    acc.cardServicios += calc.cardServicios;
    acc.gastosVar += calc.totalGastos;
    acc.autopista += calc.autopista;
    acc.empresa += calc.importeEmpresa;
    acc.chofer += calc.importeChofer;
    acc.propinas += calc.propinas;
    acc.km += calc.kmJornada;
    acc.dias += 1;
    return acc;
  }, { facturado:0, efectivo:0, efectivoEmpresa:0, cardServicios:0, gastosVar:0, autopista:0, empresa:0, chofer:0, propinas:0, km:0, dias:0 });
  const serviciosTotal = serviciosMes.reduce((s,x)=> s + (+x.importe||0), 0);
  const gastosFijosTotal = gastosFijosMes.reduce((s,g)=> s + (+g.importe||0), 0);
  return { totals, extra: { servicios: serviciosTotal, gastosFijos: gastosFijosTotal } };
}

function nombreArchivoMes(mes){
  return `cierre_${monthLabel(mes).replace(' ', '_')}.pdf`;
}

function generarPDFMensual(){
  const mes = state.mesActual || monthKey(todayISO());
  const { totals, extra } = totalesMes(mes);
  const doc = buildClosingPDF('Cierre mensual', monthLabel(mes), seccionesDesdeTotales(totals, extra));
  doc.save(nombreArchivoMes(mes));
  showToast('PDF descargado');
}

async function compartirPDFMensual(){
  const mes = state.mesActual || monthKey(todayISO());
  const { totals, extra } = totalesMes(mes);
  const doc = buildClosingPDF('Cierre mensual', monthLabel(mes), seccionesDesdeTotales(totals, extra));
  const nombre = nombreArchivoMes(mes);
  const blob = doc.output('blob');
  const file = new File([blob], nombre, { type:'application/pdf' });
  if(navigator.canShare && navigator.canShare({ files:[file] })){
    try{
      await navigator.share({ files:[file], title:'Cierre mensual', text:`Cierre mensual — ${monthLabel(mes)}` });
    }catch(e){ /* el usuario canceló el compartir */ }
  } else {
    doc.save(nombre);
    showToast('Tu dispositivo no permite compartir directo, se descargó el PDF');
  }
}

      <div style="font-size:13px; color:var(--muted); margin-bottom:14px;">${state.cierres.length} cierres · ${todosLosServicios().length} servicios (${state.servicios.length} sin cerrar) · ${state.gastos.length} gastos · ${state.mantenimientos.length} mantenimientos · ~${(bytes/1024).toFixed(1)} KB</div>
      <button class="btn btn-primary" style="margin-bottom:10px;" onclick="exportBackup()">⬇ Exportar copia de seguridad</button>
      <label class="btn btn-ghost" style="display:block; text-align:center;">
        ⬆ Importar copia de seguridad
        <input type="file" accept="application/json" id="import-file" style="display:none;" onchange="importBackup(this.files[0])">
      </label>
    </div>

    <div class="card">
      <div class="subhead">Choferes</div>
      <div style="font-size:13px; color:var(--muted); margin-bottom:10px;">Nombres usados al etiquetar cada cierre, gasto y servicio.</div>
      <div class="row2 field">
        <div><label>Chofer 1</label><input type="text" id="a-driver1" value="${state.drivers[0]}"></div>
        <div><label>Chofer 2</label><input type="text" id="a-driver2" value="${state.drivers[1]}"></div>
      </div>
      <button class="btn btn-ghost" onclick="saveDriverNames()">Guardar nombres</button>
    </div>

    <div class="card">
      <div class="subhead">Borrar todo</div>
      <div style="font-size:13px; color:var(--muted); margin-bottom:10px;">Elimina todos los cierres, gastos y servicios de este navegador. No se puede deshacer.</div>
      <button class="btn btn-danger" onclick="wipeAllData()">Borrar todos los datos</button>
    </div>

    <div class="card">
      <div class="subhead">Sesión</div>
      <div style="font-size:13px; color:var(--muted); margin-bottom:10px;">Cierra tu sesión en este dispositivo. Tendrás que volver a iniciar sesión con tu correo y contraseña.</div>
      <button class="btn btn-ghost" onclick="firebaseLogout()">Cerrar sesión</button>
    </div>
  `;
}

function exportBackup(){
  const payload = {
    exportedAt: new Date().toISOString(),
    drivers: state.drivers,
    pctEmpresa: state.pctEmpresa,
    tiposMantenimiento: state.tiposMantenimiento,
    cierres: state.cierres,
    servicios: state.servicios,
    gastos: state.gastos,
    mantenimientos: state.mantenimientos,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `taxi-cierre-backup-${todayISO()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Copia exportada');
}

function importBackup(file){
  if(!file) return;
  if(!confirm('Esto sustituirá TODOS los datos actuales de este navegador por los del archivo. ¿Continuar?')) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    try{
      const payload = JSON.parse(e.target.result);
      state.cierres = Array.isArray(payload.cierres) ? payload.cierres : [];
      state.servicios = Array.isArray(payload.servicios) ? payload.servicios : [];
      state.gastos = Array.isArray(payload.gastos) ? payload.gastos : [];
      state.mantenimientos = Array.isArray(payload.mantenimientos) ? payload.mantenimientos : [];
      if(Array.isArray(payload.drivers) && payload.drivers.length === 2) state.drivers = payload.drivers;
      if(payload.pctEmpresa) state.pctEmpresa = payload.pctEmpresa;
      if(Array.isArray(payload.tiposMantenimiento) && payload.tiposMantenimiento.length) state.tiposMantenimiento = payload.tiposMantenimiento;
      if(!state.drivers.includes(state.driver)) state.driver = state.drivers[0];
      await saveCierres(); await saveServicios(); await saveGastos(); await saveMantenimientos(); await saveConfig();
      showToast('Copia importada correctamente');
      render();
    }catch(err){
      showToast('El archivo no es una copia de seguridad válida');
    }
  };
  reader.readAsText(file);
}

function saveDriverNames(){
  const d1 = document.getElementById('a-driver1').value.trim() || 'Chofer 1';
  const d2 = document.getElementById('a-driver2').value.trim() || 'Chofer 2';
  state.drivers = [d1, d2];
  if(!state.drivers.includes(state.driver)) state.driver = d1;
  saveConfig();
  showToast('Nombres guardados');
  render();
}

function wipeAllData(){
  if(!confirm('Esto borrará TODOS los cierres, gastos, servicios y mantenimientos de este navegador. ¿Seguro?')) return;
  if(!confirm('Última confirmación: esta acción no se puede deshacer. ¿Borrar todo?')) return;
  state.cierres = []; state.servicios = []; state.gastos = []; state.mantenimientos = [];
  saveCierres(); saveServicios(); saveGastos(); saveMantenimientos();
  showToast('Datos borrados');
  render();
}

/* ---------- init ---------- */
/* loadData() se llama automáticamente cuando Firebase confirma la sesión iniciada (ver script type="module" al final) */
</script>
</body>

} from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAw9CSXwUEV7Ys4qFHz_CxgZ_9dvWxTIEI",
  authDomain: "control-taxi-37844.firebaseapp.com",

};

const firebaseAppInstance = initializeApp(firebaseConfig);
const auth = getAuth(firebaseAppInstance);
setPersistence(auth, browserLocalPersistence);

function mensajeError(codigo){
  const mapa = {
    'auth/invalid-email': 'Correo no válido',
    'auth/user-disabled': 'Esta cuenta está deshabilitada',
    'auth/user-not-found': 'No existe una cuenta con ese correo',
    'auth/wrong-password': 'Contraseña incorrecta',
    'auth/invalid-credential': 'Correo o contraseña incorrectos',
    'auth/missing-password': 'Escribe la contraseña',
    'auth/too-many-requests': 'Demasiados intentos. Espera unos minutos.',
  };
  return mapa[codigo] || 'No se pudo iniciar sesión, revisa tus datos';
}

window.firebaseLogin = async function(){
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const err = document.getElementById('lockError');
  const btn = document.getElementById('loginBtn');
  err.textContent = '';
  if(!email || !password){ err.textContent = 'Completa correo y contraseña'; return; }
  btn.textContent = 'Entrando…';
  btn.disabled = true;
  try{
    await signInWithEmailAndPassword(auth, email, password);
    // onAuthStateChanged se encarga de mostrar la app
  }catch(e){
    err.textContent = mensajeError(e.code);
  }finally{
    btn.textContent = 'Entrar';
    btn.disabled = false;
  }
};

window.firebaseLogout = function(){
  signOut(auth);
};

onAuthStateChanged(auth, (user) => {
  if(user){
    if(typeof window.showApp === 'function') window.showApp();
    if(typeof window.loadData === 'function') window.loadData();
  } else {
    if(typeof window.hideApp === 'function') window.hideApp();
  }
});
</script>
